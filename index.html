<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NetMap Pro - Ferramenta profissional para mapeamento de infraestrutura de rede e arquitetura de roteamento">
    <meta name="keywords" content="network mapping, infrastructure, routing, diagram, Unifi">
    <meta property="og:title" content="NetMap Pro">
    <meta property="og:description" content="Infrastructure & Routing Architect">
    <meta property="og:type" content="website">
    <title>NetMap Pro // Infrastructure & Routing Architect</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #0a0e17;
            --surface-1: #111827;
            --surface-2: #1a2235;
            --border-tech: #2d4a6e;
            --accent-cyan: #00d4ff;
            --accent-purple: #7c3aed;
            --accent-emerald: #10b981;
            --accent-red: #ef4444;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            
            --header-h: 52px;
            --sidebar-w: 264px;
            --inspector-w: 300px;
            --footer-h: 26px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            overflow: hidden;
            height: 100vh;
            display: grid;
            grid-template-rows: var(--header-h) 1fr var(--footer-h);
            grid-template-columns: var(--sidebar-w) 1fr auto;
            grid-template-areas: 
                "header header header"
                "sidebar canvas inspector"
                "footer footer footer";
        }

        /* --- RESPONSIVIDADE MOBILE --- */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: var(--header-h) auto 1fr auto var(--footer-h);
                grid-template-areas: 
                    "header"
                    "sidebar"
                    "canvas"
                    "inspector"
                    "footer";
            }
            
            sidebar {
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid var(--border-tech);
                overflow-x: auto;
            }
            
            inspector.visible {
                width: 100% !important;
                max-height: 300px;
                border-left: none;
                border-top: 1px solid var(--border-tech);
            }
            
            .global-tools {
                flex-wrap: wrap;
                gap: 4px;
            }
            
            .btn {
                padding: 4px 8px;
                font-size: 10px;
            }
        }

        /* --- HEADER --- */
        header {
            grid-area: header;
            background-color: var(--surface-1);
            border-bottom: 1px solid var(--border-tech);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .brand span {
            color: var(--accent-cyan);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid var(--accent-cyan);
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 6px;
        }

        .global-tools {
            display: flex;
            gap: 8px;
        }

        /* --- UI ELEMENTS --- */
        .btn {
            background-color: var(--surface-2);
            border: 1px solid var(--border-tech);
            color: var(--text-main);
            padding: 6px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--accent-cyan);
            color: #fff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background-color: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .btn-primary:hover {
            background-color: var(--accent-cyan);
            color: var(--bg-deep);
        }

        .btn-danger {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        
        .btn-danger:hover {
            background-color: var(--accent-red);
            color: #fff;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0; top: 0; opacity: 0; font-size: 100px; cursor: pointer;
        }

        /* --- SIDEBAR LEFT --- */
        sidebar {
            grid-area: sidebar;
            background-color: var(--surface-1);
            border-right: 1px solid var(--border-tech);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 9;
        }

        .sidebar-section-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            border-bottom: 1px dashed rgba(45, 74, 110, 0.3);
            padding-bottom: 4px;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .btn-mode {
            padding: 8px 4px;
            font-size: 10px;
            justify-content: center;
        }

        .btn-mode.active {
            background-color: var(--accent-cyan);
            color: var(--bg-deep);
            border-color: var(--accent-cyan);
        }
        
        .btn-mode-danger.active {
            background-color: var(--accent-red);
            color: #fff;
            border-color: var(--accent-red);
        }

        .switch-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--surface-2);
            padding: 8px 12px;
            border: 1px solid rgba(45, 74, 110, 0.2);
            margin-bottom: 4px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155; transition: .2s; border-radius: 18px;
        }

        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px;
            left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent-emerald); }
        input:checked + .slider:before { transform: translateX(16px); }

        .catalog-grid { display: flex; flex-direction: column; gap: 6px; }
        .asset-btn { justify-content: space-between; background-color: var(--surface-2); }

        /* --- WORKSPACE INFINITO --- */
        .workspace {
            grid-area: canvas;
            position: relative;
            overflow: auto;
            background-color: #05070b;
        }

        .workspace::-webkit-scrollbar { width: 10px; height: 10px; }
        .workspace::-webkit-scrollbar-track { background: var(--bg-deep); }
        .workspace::-webkit-scrollbar-thumb { background: var(--surface-2); border: 2px solid var(--bg-deep); }
        .workspace::-webkit-scrollbar-thumb:hover { background: var(--border-tech); }

        canvas {
            display: block;
            background-color: var(--bg-deep);
            background-image: radial-gradient(rgba(45, 74, 110, 0.25) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        /* --- INSPECTOR SIDEBAR (RIGHT) --- */
        inspector {
            grid-area: inspector;
            background-color: var(--surface-1);
            border-left: 1px solid var(--border-tech);
            width: 0;
            opacity: 0;
            overflow-x: hidden;
            overflow-y: auto;
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 9;
        }

        inspector.visible {
            width: var(--inspector-w);
            padding: 16px;
            opacity: 1;
        }

        .device-info-card {
            background: var(--surface-2);
            border: 1px solid var(--border-tech);
            padding: 12px;
        }

        .device-info-card input {
            background: var(--bg-deep);
            border: 1px solid var(--border-tech);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            padding: 4px 8px;
            width: 100%;
            margin-top: 4px;
        }

        .port-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .port-box {
            background: var(--bg-deep);
            border: 1px solid var(--border-tech);
            padding: 6px 2px;
            text-align: center;
            font-size: 10px;
        }

        .port-box.connected {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .connection-list {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .connection-item {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 8px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-disconnect {
            background: transparent; border: none; color: var(--accent-red); cursor: pointer;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface-1);
            border: 1px solid var(--border-tech);
            padding: 20px;
            min-width: 300px;
            max-width: 500px;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: var(--accent-cyan);
        }

        .modal-content select,
        .modal-content input {
            width: 100%;
            background: var(--bg-deep);
            border: 1px solid var(--border-tech);
            color: #fff;
            padding: 8px;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* --- FOOTER --- */
        footer {
            grid-area: footer;
            background-color: var(--surface-1);
            border-top: 1px solid var(--border-tech);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">NETMAP PRO <span>v5.0_NOC_CORE</span></div>
        <div class="global-tools">
            <div class="file-input-wrapper">
                <button class="btn">📂 Upload Planta</button>
                <input type="file" id="blueprintUpload" accept="image/*" />
            </div>
            <button class="btn btn-primary" onclick="App.exportProject()">💾 Salvar</button>
            <div class="file-input-wrapper">
                <button class="btn" style="border-color: var(--accent-emerald)">📥 Carregar</button>
                <input type="file" id="projectLoad" accept=".json" />
            </div>
            <button class="btn" onclick="App.undo()" id="btnUndo">↶ Undo</button>
            <button class="btn" onclick="App.redo()" id="btnRedo">↷ Redo</button>
            <button class="btn btn-danger" onclick="App.clearCanvas()">Limpar</button>
        </div>
    </header>

    <sidebar>
        <div>
            <div class="sidebar-section-title">Modo de Operação</div>
            <div class="mode-selector">
                <button class="btn btn-mode active" id="mode-select" onclick="App.setMode('select')">➔ Ponteiro</button>
                <button class="btn btn-mode" id="mode-wall" onclick="App.setMode('wall')">🧱 Paredes</button>
                <button class="btn btn-mode" id="mode-rect" onclick="App.setMode('rect')">🟩 Áreas</button>
                <button class="btn btn-mode" id="mode-link" onclick="App.setMode('link')">⚡ Linkar</button>
                <button class="btn btn-mode btn-mode-danger" id="mode-eraser" onclick="App.setMode('eraser')" style="grid-column: span 2; margin-top: 4px;">❌ Apagador</button>
            </div>
        </div>

        <div>
            <div class="sidebar-section-title">Camadas de Visibilidade</div>
            <div class="switch-item">
                <span>Construção / Planta</span>
                <label class="switch">
                    <input type="checkbox" id="layer-construction" checked onchange="App.toggleLayer('construction')">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="switch-item">
                <span>Ativos / Dispositivos</span>
                <label class="switch">
                    <input type="checkbox" id="layer-devices" checked onchange="App.toggleLayer('devices')">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="switch-item">
                <span>Links / Cabeamento</span>
                <label class="switch">
                    <input type="checkbox" id="layer-links" checked onchange="App.toggleLayer('links')">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div>
            <div class="sidebar-section-title">Catálogo de Ativos</div>
            <div class="catalog-grid" id="catalogContainer">
                <div style="color:var(--text-muted); font-size:10px; font-style:italic;">Carregando...</div>
            </div>
        </div>
    </sidebar>

    <div class="workspace" id="workspaceContainer">
        <canvas id="netCanvas" width="4000" height="3000"></canvas>
    </div>

    <inspector id="inspectorPanel"></inspector>

    <footer>
        <div class="sys-log" id="systemLog">[SYSTEM]: Inicializando ecossistema infinito...</div>
        <div class="coords" id="coordDisplay">X: 0000 // Y: 0000</div>
    </footer>

    <script>
        const State = {
            gridSize: 28,
            currentMode: 'select',
            layers: { construction: true, devices: true, links: true },
            catalog: [], 
            project: {
                blueprintData: null,
                walls: [],     
                devices: [],
                links: []
            },
            runtime: {
                blueprintImage: null,
                selectedDevice: null,
                draggedDevice: null,
                dragOffset: { x: 0, y: 0 },
                activeWallStart: null,
                activeRectStart: null,
                activeLinkSource: null, 
                mouseCanvasPos: { x: 0, y: 0 },
                needsRender: true
            }
        };

        // --- SISTEMA DE UNDO/REDO ---
        const History = {
            stack: [],
            currentIndex: -1,
            maxStackSize: 50,
            
            push() {
                this.stack = this.stack.slice(0, this.currentIndex + 1);
                this.stack.push(JSON.parse(JSON.stringify(State.project)));
                this.currentIndex++;
                if (this.stack.length > this.maxStackSize) {
                    this.stack.shift();
                    this.currentIndex--;
                }
                this.updateButtons();
            },
            
            undo() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    State.project = JSON.parse(JSON.stringify(this.stack[this.currentIndex]));
                    State.runtime.selectedDevice = null;
                    App.updateInspector();
                    App.scheduleRender();
                    App.log('Undo executado');
                }
                this.updateButtons();
            },
            
            redo() {
                if (this.currentIndex < this.stack.length - 1) {
                    this.currentIndex++;
                    State.project = JSON.parse(JSON.stringify(this.stack[this.currentIndex]));
                    State.runtime.selectedDevice = null;
                    App.updateInspector();
                    App.scheduleRender();
                    App.log('Redo executado');
                }
                this.updateButtons();
            },
            
            updateButtons() {
                document.getElementById('btnUndo').disabled = this.currentIndex <= 0;
                document.getElementById('btnRedo').disabled = this.currentIndex >= this.stack.length - 1;
            }
        };

        const App = {
            ctx: null,
            canvas: null,
            renderScheduled: false,

            init() {
                this.canvas = document.getElementById('netCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.setupCanvas();
                this.registerEvents();
                this.loadExternalCatalog(); 
                this.updateInspector();

                const projetoTeste = {
                    "walls": [
                        {"x1":140,"y1":140,"x2":560,"y2":140},
                        {"x1":560,"y1":140,"x2":560,"y2":420},
                        {"x1":560,"y1":420,"x2":140,"y2":420},
                        {"x1":140,"y1":420,"x2":140,"y2":140}
                    ],
                    "devices": [
                        {"id":"dev_mock_1","type":"Controladora Core","color":"#7c3aed","ports":8,"portsData":{},"x":224,"y":280,"label":"Controladora_1"},
                        {"id":"dev_mock_2","type":"Switch PoE 24p","color":"#00d4ff","ports":24,"portsData":{},"x":448,"y":280,"label":"Switch_1"},
                        {"id":"dev_mock_3","type":"Access Point Wi-Fi 6","color":"#10b981","ports":1,"portsData":{},"x":448,"y":532,"label":"AP_1"}
                    ],
                    "links": [
                        {"id":"link_mock_1","fromId":"dev_mock_1","fromPort":1,"toId":"dev_mock_2","toPort":24},
                        {"id":"link_mock_2","fromId":"dev_mock_2","fromPort":16,"toId":"dev_mock_3","toPort":1}
                    ]
                };
                this.importProject(JSON.stringify(projetoTeste));
                History.push();
                History.updateButtons();
            },

            setupCanvas() {
                const dpr = window.devicePixelRatio || 1;
                const container = document.getElementById('workspaceContainer');
                
                const width = Math.max(container.clientWidth, 2500);
                const height = Math.max(container.clientHeight, 2500);
                
                this.canvas.width = width * dpr;
                this.canvas.height = height * dpr;
                this.canvas.style.width = width + 'px';
                this.canvas.style.height = height + 'px';
                this.ctx.scale(dpr, dpr);
            },

            scheduleRender() {
                if (!this.renderScheduled) {
                    this.renderScheduled = true;
                    requestAnimationFrame(() => {
                        this.render();
                        this.renderScheduled = false;
                    });
                }
            },

            async loadExternalCatalog() {
                try {
                    const response = await fetch('catalogo_gemini.json');
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    State.catalog = await response.json();
                    this.renderCatalog();
                    this.log("Catálogo corporativo sincronizado.");
                } catch (error) {
                    this.log("Usando catálogo local.", "danger");
                    State.catalog = [
                        { "Tipo": "Controladora Core", "Portas": 8, "Color": "#7c3aed" },
                        { "Tipo": "Switch PoE 24p", "Portas": 24, "Color": "#00d4ff" },
                        { "Tipo": "Access Point Wi-Fi 6", "Portas": 1, "Radius": 185, "Color": "#10b981" },
                        { "Tipo": "Câmera IP 4K", "Portas": 1, "Radius": 130, "Color": "#ef4444" },
                        { "Tipo": "Workstation Computador", "Portas": 1, "Color": "#e2e8f0" }
                    ];
                    this.renderCatalog();
                }
            },

            log(msg, type = 'system') {
                document.getElementById('systemLog').innerText = `[${type.toUpperCase()}]: ${msg}`;
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            setMode(mode) {
                State.currentMode = mode;
                document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
                document.getElementById(`mode-${mode}`).classList.add('active');
                
                State.runtime.activeWallStart = null;
                State.runtime.activeRectStart = null;
                State.runtime.activeLinkSource = null;
                
                if(mode !== 'select') {
                    State.runtime.selectedDevice = null;
                    this.updateInspector();
                }
                this.log(`Modo: ${mode.toUpperCase()}`);
                this.scheduleRender();
            },

            toggleLayer(layer) {
                State.layers[layer] = document.getElementById(`layer-${layer}`).checked;
                this.scheduleRender();
            },

            snap(val) {
                return Math.round(val / State.gridSize) * State.gridSize;
            },

            renderCatalog() {
                const container = document.getElementById('catalogContainer');
                container.innerHTML = '';
                State.catalog.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'btn asset-btn';
                    btn.onclick = () => this.addAssetToCanvas(item);
                    btn.innerHTML = `<span>🖥️ ${this.escapeHtml(item.Tipo)}</span><span class="badge" style="background:rgba(0,212,255,0.1); padding:2px 6px; border-radius:10px;">${item.Portas}P</span>`;
                    container.appendChild(btn);
                });
            },

            addAssetToCanvas(proto) {
                const scrollWrapper = document.getElementById('workspaceContainer');
                
                const targetX = this.snap(scrollWrapper.scrollLeft + (scrollWrapper.clientWidth / 2));
                const targetY = this.snap(scrollWrapper.scrollTop + (scrollWrapper.clientHeight / 2));

                const newDevice = {
                    id: 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                    type: proto.Tipo,
                    color: proto.Color,
                    radius: proto.Radius || null,
                    ports: proto.Portas,
                    portsData: {}, 
                    x: targetX,
                    y: targetY,
                    label: `${proto.Tipo.split(' ')[0]}_${State.project.devices.length + 1}`
                };
                State.project.devices.push(newDevice);
                this.setMode('select');
                State.runtime.selectedDevice = newDevice;
                this.updateInspector();
                History.push();
                this.scheduleRender();
            },

            deleteDevice(id) {
                const dev = State.project.devices.find(d => d.id === id);
                if (dev && confirm(`Remover ${dev.label}?`)) {
                    State.project.links = State.project.links.filter(l => l.fromId !== id && l.toId !== id);
                    State.project.devices = State.project.devices.filter(d => d.id !== id);
                    State.runtime.selectedDevice = null;
                    this.updateInspector();
                    History.push();
                    this.scheduleRender();
                }
            },

            updateInspector() {
                const panel = document.getElementById('inspectorPanel');
                const dev = State.runtime.selectedDevice;

                if (!dev || State.currentMode !== 'select') {
                    panel.classList.remove('visible');
                    return;
                }

                panel.classList.add('visible');
                const deviceLinks = State.project.links.filter(l => l.fromId === dev.id || l.toId === dev.id);
                
                if (!dev.portsData) dev.portsData = {};

                let html = `
                    <div>
                        <div class="sidebar-section-title">Ações do Ativo</div>
                        <button class="btn btn-danger" style="width:100%; justify-content:center; margin-bottom:12px;" onclick="App.deleteDevice('${dev.id}')">🗑️ Remover</button>
                        
                        <div class="sidebar-section-title">Propriedades</div>
                        <div class="device-info-card">
                            <label style="color: var(--text-muted); font-size:10px;">TAG</label>
                            <input type="text" value="${this.escapeHtml(dev.label)}" oninput="App.updateDeviceLabel('${dev.id}', this.value)">
                            <div style="margin-top:10px; font-size:11px; color: var(--accent-cyan)">${this.escapeHtml(dev.type)}</div>
                        </div>
                    </div>

                    <div>
                        <div class="sidebar-section-title">Portas Físicas</div>
                        <div class="port-grid">
                `;

                for (let i = 1; i <= dev.ports; i++) {
                    const linkVinculado = deviceLinks.find(l => (l.fromId === dev.id && l.fromPort === i) || (l.toId === dev.id && l.toPort === i));
                    
                    let cName = 'port-box';
                    let customLabel = dev.portsData[i] === "Computador" ? "PC" : (dev.portsData[i] === "Impressora" ? "IMP" : `P${String(i).padStart(2, '0')}`);
                    let inlineStyle = '';

                    if (linkVinculado) {
                        cName += ' connected';
                        const destinoIsTo = linkVinculado.fromId === dev.id;
                        const vizinhoId = destinoIsTo ? linkVinculado.toId : linkVinculado.fromId;
                        const vizinho = State.project.devices.find(d => d.id === vizinhoId);
                        
                        if (vizinho) {
                            let tipoLower = vizinho.type.toLowerCase();
                            let shortTag = 'NÓ';
                            if (tipoLower.includes('workstation') || tipoLower.includes('computador')) shortTag = 'PC';
                            else if (tipoLower.includes('switch')) shortTag = 'SW';
                            else if (tipoLower.includes('access') || tipoLower.includes('point')) shortTag = 'AP';
                            else if (tipoLower.includes('controladora')) shortTag = 'CTRL';

                            customLabel = shortTag;
                            inlineStyle = `style="border-color: ${vizinho.color}; color: ${vizinho.color}; font-weight: bold;"`;
                        }
                    } else if (dev.portsData[i] && dev.portsData[i] !== "Nenhum") {
                        cName += ' connected';
                        inlineStyle = `style="border-color: var(--accent-emerald); color: var(--accent-emerald); font-weight: bold;"`;
                    }

                    html += `<div class="${cName}" ${inlineStyle}>${customLabel}</div>`;
                }

                html += `</div></div>`;

                const tipoAtivoLower = dev.type.toLowerCase();
                if (tipoAtivoLower.includes('switch') || tipoAtivoLower.includes('controladora') || tipoAtivoLower.includes('firewall')) {
                    html += `
                        <div>
                            <div class="sidebar-section-title">Atribuição de Terminais</div>
                            <p style="color: var(--text-muted); font-size:10px; margin-bottom:8px;">Dispositivo conectado:</p>
                            <div style="display:flex; flex-direction:column; gap:8px; background:var(--surface-2); padding:10px; border:1px solid var(--border-tech);">
                                <label style="font-size:10px; color:var(--text-muted)">Porta:</label>
                                <select id="inspectorPortSelector" style="background:var(--bg-deep); color:#fff; border:1px solid var(--border-tech); padding:4px;" onchange="App.updatePortTerminalSelector('${dev.id}')">
                    `;

                    for(let i = 1; i <= dev.ports; i++) {
                        html += `<option value="${i}">Porta ${String(i).padStart(2, '0')} (${dev.portsData[i] || 'Vazia'})</option>`;
                    }

                    html += `
                                </select>
                                <label style="font-size:10px; color:var(--text-muted); margin-top:4px;">Dispositivo:</label>
                                <select id="inspectorTerminalType" style="background:var(--bg-deep); color:#fff; border:1px solid var(--border-tech); padding:4px;" onchange="App.savePortTerminal('${dev.id}')">
                                    <option value="Nenhum">Nenhum / Vazia</option>
                                    <option value="Computador">Computador (PC)</option>
                                    <option value="Impressora">Impressora (PRN)</option>
                                </select>
                            </div>
                        </div>
                    `;
                }

                html += `
                    <div>
                        <div class="sidebar-section-title">Roteamento</div>
                        <div class="connection-list">
                `;

                if (deviceLinks.length === 0) {
                    html += `<div style="color: var(--text-muted); font-size:11px; font-style:italic;">Nenhum cabo.</div>`;
                } else {
                    deviceLinks.forEach(link => {
                        const targetIsTo = link.fromId === dev.id;
                        const localPort = targetIsTo ? link.fromPort : link.toPort;
                        const targetId = targetIsTo ? link.toId : link.fromId;
                        const targetPort = targetIsTo ? link.toPort : link.fromPort;
                        const targetDevice = State.project.devices.find(d => d.id === targetId);
                        const targetLabel = targetDevice ? targetDevice.label : 'Desconhecido';

                        html += `
                            <div class="connection-item">
                                <div>
                                    <span style="color: var(--accent-cyan)">P.${localPort}</span> ➔ <span>${this.escapeHtml(targetLabel)} [P.${targetPort}]</span>
                                </div>
                                <button class="btn-disconnect" onclick="App.removeLink('${link.id}')">✕</button>
                            </div>
                        `;
                    });
                }

                html += `</div></div>`;
                panel.innerHTML = html;
                this.updatePortTerminalSelector(dev.id);
            },

            updatePortTerminalSelector(id) {
                const dev = State.project.devices.find(d => d.id === id);
                const selector = document.getElementById('inspectorPortSelector');
                const typeInput = document.getElementById('inspectorTerminalType');
                
                if (selector && typeInput) {
                    const portaSelecionada = selector.value;
                    typeInput.value = dev.portsData[portaSelecionada] || "Nenhum";
                }
            },

            savePortTerminal(id) {
                const dev = State.project.devices.find(d => d.id === id);
                const portaSelecionada = document.getElementById('inspectorPortSelector').value;
                const tipoTerminal = document.getElementById('inspectorTerminalType').value;
                
                dev.portsData[portaSelecionada] = tipoTerminal;
                this.updateInspector();
                History.push();
                this.scheduleRender();
                this.log(`Porta ${portaSelecionada}: ${tipoTerminal}`);
            },

            updateDeviceLabel(id, val) {
                const dev = State.project.devices.find(d => d.id === id);
                if (dev) {
                    dev.label = val;
                    this.scheduleRender();
                }
            },

            removeLink(linkId) {
                State.project.links = State.project.links.filter(l => l.id !== linkId);
                this.updateInspector();
                History.push();
                this.scheduleRender();
            },

            clearCanvas() {
                if (confirm("Limpar tudo?")) {
                    State.project.walls = []; 
                    State.project.devices = []; 
                    State.project.links = [];
                    State.project.blueprintData = null; 
                    State.runtime.blueprintImage = null; 
                    State.runtime.selectedDevice = null;
                    this.updateInspector();
                    History.push();
                    this.scheduleRender();
                }
            },

            exportProject() {
                // 1. Cria um objeto compactado
                const compact = {
                    b: State.project.blueprintData, // blueprintData
                    w: State.project.walls.map(w => [w.x1, w.y1, w.x2, w.y2]), // Array de arrays é menor que objetos
                    d: State.project.devices.map(d => ({
                        i: d.id,          // id
                        t: d.type,        // type
                        c: d.color,       // color
                        p: d.ports,       // ports
                        pd: Object.keys(d.portsData || {}).length ? d.portsData : null, // portsData (só salva se tiver dados)
                        x: d.x, 
                        y: d.y, 
                        l: d.label        // label
                    })),
                    l: State.project.links.map(lk => [lk.fromId, lk.fromPort, lk.toId, lk.toPort]) // Array de arrays
                };
            
                // 2. Converte para string SEM espaços (null, 2 é removido)
                const jsonString = JSON.stringify(compact);
                
                // 3. Cria o download
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `netmap_compact_${Date.now()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                this.log('Projeto exportado (Compactado)');
            },

            importProject(jsonData) {
            try {
                const compact = JSON.parse(jsonData);
                
                // Reconstrói o objeto original a partir do formato compactado
                const restored = {
                    blueprintData: compact.b || null,
                    walls: (compact.w || []).map(w => ({ x1: w[0], y1: w[1], x2: w[2], y2: w[3] })),
                    devices: (compact.d || []).map(d => ({
                        id: d.i,
                        type: d.t,
                        color: d.c,
                        ports: d.p,
                        portsData: d.pd || {},
                        x: d.x,
                        y: d.y,
                        label: d.l
                    })),
                    links: (compact.l || []).map((lk, index) => ({
                        id: lk.id || `link_imp_${index}`, // Mantém ID antigo ou gera novo
                        fromId: lk[0],
                        fromPort: lk[1],
                        toId: lk[2],
                        toPort: lk[3]
                    }))
                };
        
                State.project = restored;
                State.runtime.selectedDevice = null;
                
                if (State.project.blueprintData) {
                    const img = new Image();
                    img.onload = () => { 
                        State.runtime.blueprintImage = img;
                        this.scheduleRender();
                    };
                    img.src = State.project.blueprintData;
                }
                
                this.updateInspector();
                History.push();
                this.scheduleRender();
                this.log("Projeto carregado e descompactado");
            } catch (e) { 
                this.log("Erro ao ler arquivo JSON", "danger"); 
                console.error(e);
            }
        },

            showPortModal(device, callback) {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>Selecionar Porta - ${this.escapeHtml(device.label)}</h3>
                        <label style="color: var(--text-muted); font-size: 11px;">Porta (1-${device.ports}):</label>
                        <input type="number" id="modalPortInput" min="1" max="${device.ports}" value="1" />
                        <div class="modal-buttons">
                            <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
                            <button class="btn btn-primary" onclick="App.confirmPortModal(${device.ports})">Confirmar</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.callback = callback;
            },

            confirmPortModal(maxPorts) {
                const modal = document.querySelector('.modal-overlay');
                const input = document.getElementById('modalPortInput');
                const port = parseInt(input.value);
                
                if (port >= 1 && port <= maxPorts) {
                    modal.callback(port);
                    modal.remove();
                } else {
                    alert(`Porta deve ser entre 1 e ${maxPorts}`);
                }
            },

            registerEvents() {
                const canvas = this.canvas;

                document.getElementById('blueprintUpload').addEventListener('change', (e) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => { 
                            State.runtime.blueprintImage = img; 
                            State.project.blueprintData = event.target.result;
                            History.push();
                            this.scheduleRender();
                        };
                        img.src = event.target.result;
                    };
                    if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
                });

                document.getElementById('projectLoad').addEventListener('change', (e) => {
                    const reader = new FileReader();
                    reader.onload = (event) => this.importProject(event.target.result);
                    if (e.target.files[0]) reader.readAsText(e.target.files[0]);
                });

                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    State.runtime.mouseCanvasPos = { x: mouseX, y: mouseY };
                    
                    document.getElementById('coordDisplay').innerText = `X: ${String(Math.round(mouseX)).padStart(4, '0')} // Y: ${String(Math.round(mouseY)).padStart(4, '0')}`;

                    if (State.currentMode === 'select' && State.runtime.draggedDevice) {
                        State.runtime.draggedDevice.x = this.snap(mouseX - State.runtime.dragOffset.x);
                        State.runtime.draggedDevice.y = this.snap(mouseY - State.runtime.dragOffset.y);
                        this.scheduleRender();
                    }

                    if (State.currentMode === 'wall' || State.currentMode === 'rect' || State.currentMode === 'link') {
                        this.scheduleRender();
                    }
                });

                canvas.addEventListener('mousedown', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    let clickedDevice = null;
                    if (State.layers.devices) {
                        for (let dev of State.project.devices) {
                            if (Math.hypot(mouseX - dev.x, mouseY - dev.y) < 22) {
                                clickedDevice = dev;
                                break;
                            }
                        }
                    }

                    if (State.currentMode === 'eraser' && State.layers.construction) {
                        const wallIndex = State.project.walls.findIndex(w => {
                            const A = mouseX - w.x1; const B = mouseY - w.y1;
                            const C = w.x2 - w.x1; const D = w.y2 - w.y1;
                            const dot = A * C + B * D;
                            const len_sq = C * C + D * D;
                            let param = -1;
                            if (len_sq !== 0) param = dot / len_sq;

                            let xx, yy;
                            if (param < 0) { xx = w.x1; yy = w.y1; }
                            else if (param > 1) { xx = w.x2; yy = w.y2; }
                            else { xx = w.x1 + param * C; yy = w.y1 + param * D; }

                            const dist = Math.hypot(mouseX - xx, mouseY - yy);
                            return dist < 8; 
                        });

                        if (wallIndex !== -1) {
                            State.project.walls.splice(wallIndex, 1);
                            History.push();
                            this.scheduleRender();
                            this.log("Parede removida");
                            return;
                        }
                    }

                    if (State.currentMode === 'select') {
                        if (clickedDevice) {
                            State.runtime.selectedDevice = clickedDevice;
                            State.runtime.draggedDevice = clickedDevice;
                            State.runtime.dragOffset = { x: mouseX - clickedDevice.x, y: mouseY - clickedDevice.y };
                        } else {
                            State.runtime.selectedDevice = null; 
                        }
                        this.updateInspector();
                        this.scheduleRender();
                    }

                    if (State.currentMode === 'wall' && State.layers.construction) {
                        const sx = this.snap(mouseX); const sy = this.snap(mouseY);
                        if (!State.runtime.activeWallStart) {
                            State.runtime.activeWallStart = { x: sx, y: sy };
                        } else {
                            if (State.runtime.activeWallStart.x !== sx || State.runtime.activeWallStart.y !== sy) {
                                State.project.walls.push({ x1: State.runtime.activeWallStart.x, y1: State.runtime.activeWallStart.y, x2: sx, y2: sy });
                                History.push();
                            }
                            State.runtime.activeWallStart = { x: sx, y: sy };
                        }
                        this.scheduleRender();
                    }

                    if (State.currentMode === 'rect' && State.layers.construction) {
                        const sx = this.snap(mouseX); const sy = this.snap(mouseY);
                        if (!State.runtime.activeRectStart) {
                            State.runtime.activeRectStart = { x: sx, y: sy };
                        } else {
                            const x1 = State.runtime.activeRectStart.x;
                            const y1 = State.runtime.activeRectStart.y;
                            const x2 = sx;
                            const y2 = sy;

                            if (x1 !== x2 && y1 !== y2) {
                                State.project.walls.push({ x1: x1, y1: y1, x2: x2, y2: y1 }); 
                                State.project.walls.push({ x1: x2, y1: y1, x2: x2, y2: y2 }); 
                                State.project.walls.push({ x1: x2, y1: y2, x2: x1, y2: y2 }); 
                                State.project.walls.push({ x1: x1, y1: y2, x2: x1, y2: y1 }); 
                                History.push();
                                this.log("Cômodo criado");
                            }
                            State.runtime.activeRectStart = null;
                        }
                        this.scheduleRender();
                    }

                    if (State.currentMode === 'link' && clickedDevice) {
                        if (!State.runtime.activeLinkSource) {
                            State.runtime.activeLinkSource = clickedDevice;
                            this.log(`Origem: ${clickedDevice.label}`);
                            this.scheduleRender();
                        } else {
                            const src = State.runtime.activeLinkSource;
                            if (src.id !== clickedDevice.id) {
                                let pSrc = 1;
                                let pDst = 1;

                                const createLink = (srcPort, dstPort) => {
                                    State.project.links.push({
                                        id: 'link_' + Date.now(), 
                                        fromId: src.id, 
                                        fromPort: srcPort, 
                                        toId: clickedDevice.id, 
                                        toPort: dstPort
                                    });
                                    History.push();
                                    this.scheduleRender();
                                    this.log(`Link: ${src.label} [P${srcPort}] ➔ ${clickedDevice.label} [P${dstPort}]`);
                                    State.runtime.activeLinkSource = null;
                                    this.setMode('select');
                                };

                                if (src.ports > 1) {
                                    this.showPortModal(src, (srcPort) => {
                                        pSrc = srcPort;
                                        if (clickedDevice.ports > 1) {
                                            this.showPortModal(clickedDevice, (dstPort) => {
                                                pDst = dstPort;
                                                createLink(pSrc, pDst);
                                            });
                                        } else {
                                            createLink(pSrc, 1);
                                        }
                                    });
                                } else if (clickedDevice.ports > 1) {
                                    this.showPortModal(clickedDevice, (dstPort) => {
                                        pDst = dstPort;
                                        createLink(1, pDst);
                                    });
                                } else {
                                    createLink(1, 1);
                                }
                            } else {
                                State.runtime.activeLinkSource = null;
                                this.scheduleRender();
                            }
                        }
                    }
                });

                window.addEventListener('mouseup', () => { 
                    if (State.runtime.draggedDevice) {
                        History.push();
                    }
                    State.runtime.draggedDevice = null; 
                });

                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') { 
                        State.runtime.activeWallStart = null; 
                        State.runtime.activeRectStart = null; 
                        State.runtime.activeLinkSource = null; 
                        this.updateInspector();
                        this.scheduleRender();
                    }
                    
                    if (e.ctrlKey && e.key === 'z') {
                        e.preventDefault();
                        History.undo();
                    }
                    
                    if (e.ctrlKey && e.key === 'y') {
                        e.preventDefault();
                        History.redo();
                    }
                    
                    if (e.ctrlKey && e.key === 's') {
                        e.preventDefault();
                        this.exportProject();
                    }
                    
                    if (e.key === 'Delete' && State.runtime.selectedDevice) {
                        this.deleteDevice(State.runtime.selectedDevice.id);
                    }
                    
                    if (e.key >= '1' && e.key <= '5' && !e.ctrlKey && !e.altKey) {
                        const modes = ['select', 'wall', 'rect', 'link', 'eraser'];
                        this.setMode(modes[parseInt(e.key) - 1]);
                    }
                });

                window.addEventListener('resize', () => {
                    this.setupCanvas();
                    this.scheduleRender();
                });
            },

            render() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                if (State.layers.construction && State.runtime.blueprintImage) {
                    ctx.save(); 
                    ctx.globalAlpha = 0.35; 
                    ctx.drawImage(State.runtime.blueprintImage, 0, 0); 
                    ctx.restore();
                }

                if (State.layers.construction) {
                    ctx.lineWidth = 4; 
                    ctx.lineCap = "round"; 
                    ctx.strokeStyle = varColor('--border-tech');
                    State.project.walls.forEach(w => { 
                        ctx.beginPath(); 
                        ctx.moveTo(w.x1, w.y1); 
                        ctx.lineTo(w.x2, w.y2); 
                        ctx.stroke(); 
                    });

                    if (State.currentMode === 'wall' && State.runtime.activeWallStart) {
                        ctx.lineWidth = 2; 
                        ctx.strokeStyle = varColor('--accent-purple'); 
                        ctx.setLineDash([4, 4]);
                        ctx.beginPath(); 
                        ctx.moveTo(State.runtime.activeWallStart.x, State.runtime.activeWallStart.y);
                        ctx.lineTo(this.snap(State.runtime.mouseCanvasPos.x), this.snap(State.runtime.mouseCanvasPos.y));
                        ctx.stroke(); 
                        ctx.setLineDash([]);
                    }

                    if (State.currentMode === 'rect' && State.runtime.activeRectStart) {
                        ctx.lineWidth = 2; 
                        ctx.strokeStyle = varColor('--accent-emerald'); 
                        ctx.setLineDash([4, 4]);
                        const curW = this.snap(State.runtime.mouseCanvasPos.x) - State.runtime.activeRectStart.x;
                        const curH = this.snap(State.runtime.mouseCanvasPos.y) - State.runtime.activeRectStart.y;
                        ctx.strokeRect(State.runtime.activeRectStart.x, State.runtime.activeRectStart.y, curW, curH);
                        ctx.setLineDash([]);
                    }
                }

                if (State.layers.links) {
                    ctx.lineWidth = 2;
                    State.project.links.forEach(link => {
                        const fromNode = State.project.devices.find(d => d.id === link.fromId);
                        const toNode = State.project.devices.find(d => d.id === link.toId);
                        
                        if (fromNode && toNode) {
                            ctx.beginPath(); 
                            ctx.strokeStyle = varColor('--accent-cyan');
                            ctx.moveTo(fromNode.x, fromNode.y); 
                            ctx.lineTo(toNode.x, toNode.y); 
                            ctx.stroke();

                            ctx.fillStyle = '#fff'; 
                            ctx.font = "bold 9px 'JetBrains Mono'";
                            const p1X = fromNode.x + (toNode.x - fromNode.x) * 0.22;
                            const p1Y = fromNode.y + (toNode.y - fromNode.y) * 0.22;
                            const p2X = fromNode.x + (toNode.x - fromNode.x) * 0.78;
                            const p2Y = fromNode.y + (toNode.y - fromNode.y) * 0.78;

                            ctx.fillText(`P${link.fromPort}`, p1X, p1Y - 4);
                            ctx.fillText(`P${link.toPort}`, p2X, p2Y - 4);
                        }
                    });

                    if (State.currentMode === 'link' && State.runtime.activeLinkSource) {
                        ctx.strokeStyle = varColor('--accent-cyan'); 
                        ctx.lineWidth = 1.5; 
                        ctx.setLineDash([5, 4]);
                        ctx.beginPath(); 
                        ctx.moveTo(State.runtime.activeLinkSource.x, State.runtime.activeLinkSource.y);
                        ctx.lineTo(State.runtime.mouseCanvasPos.x, State.runtime.mouseCanvasPos.y);
                        ctx.stroke(); 
                        ctx.setLineDash([]);
                    }
                }

                if (State.layers.devices) {
                    State.project.devices.forEach(dev => {
                        const isSelected = State.runtime.selectedDevice && State.runtime.selectedDevice.id === dev.id;
                        if (dev.radius && isSelected) {
                            ctx.beginPath(); 
                            ctx.arc(dev.x, dev.y, dev.radius, 0, Math.PI * 2);
                            ctx.fillStyle = hexToRgbA(dev.color, 0.05); 
                            ctx.fill();
                            ctx.strokeStyle = dev.color; 
                            ctx.lineWidth = 1; 
                            ctx.setLineDash([6, 4]); 
                            ctx.stroke(); 
                            ctx.setLineDash([]);
                        }
                    });

                    State.project.devices.forEach(dev => {
                        const isSelected = State.runtime.selectedDevice && State.runtime.selectedDevice.id === dev.id;
                        
                        ctx.save();
                        ctx.beginPath(); 
                        ctx.arc(dev.x, dev.y, 18, 0, Math.PI * 2);
                        ctx.fillStyle = varColor('--surface-1'); 
                        ctx.fill();
                        
                        ctx.lineWidth = isSelected ? 3 : 1.5;
                        ctx.strokeStyle = isSelected ? varColor('--accent-cyan') : dev.color;
                        ctx.stroke();

                        ctx.fillStyle = isSelected ? varColor('--accent-cyan') : dev.color;
                        ctx.font = "bold 9px 'JetBrains Mono'"; 
                        ctx.textAlign = "center"; 
                        ctx.textBaseline = "middle";
                        const coreLabel = dev.type.split(' ').map(w => w[0]).join('').substring(0, 3).toUpperCase();
                        ctx.fillText(coreLabel, dev.x, dev.y);

                        ctx.fillStyle = isSelected ? '#fff' : varColor('--text-main');
                        ctx.font = "bold 10px 'JetBrains Mono'";
                        ctx.fillText(dev.label, dev.x, dev.y + 32);
                        ctx.restore();
                    });
                }
            },

            undo() {
                History.undo();
            },

            redo() {
                History.redo();
            }
        };

        function varColor(name) { 
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); 
        }

        function hexToRgbA(hex, alpha) {
            let c = hex.substring(1).split('');
            if (c.length == 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
            c = '0x' + c.join('');
            return `rgba(${(c >> 16) & 255}, ${(c >> 8) & 255}, ${c & 255}, ${alpha})`;
        }

        window.onload = () => App.init();
    </script>
